<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siske Kastiel | Contact</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar">
        <a href="index.html" class="logo">Siske.</a>
        <button class="nav-toggle" aria-label="Open menu" aria-expanded="false">
          ☰
        </button>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">Over mij</a></li>
          <li><a href="work.html">Werk</a></li>
          <li><a class="active" href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main class="page-content">
      <section class="section">
        <h1>Contact</h1>
        <p>Heb je een vraag of wil je samenwerken? Neem contact met mij op.</p>
        <ul class="contact-list">
          <li>Email: <a href="mailto:Siskekastiel2020@outlook.com">Siskekastiel2020@outlook.com</a></li>
          <li>LinkedIn: <a href="https://linkedin.com/in/siske" target="_blank" rel="noopener">linkedin.com/in/siske</a></li>
          <li>Locatie: Suriname</li>
        </ul>
      </section>

      <section class="section">
        <form class="contact-form">
          <label for="name">Naam</label>
          <input id="name" name="name" type="text" placeholder="Jouw naam" />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Siskekastiel2020@outlook.com" />

          <label for="message">Bericht</label>
          <textarea id="message" name="message" rows="5" placeholder="Schrijf je bericht hier..."></textarea>

          <button class="btn btn-primary" type="submit">Verstuur</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <p>© <span id="year"></span> Siske Kastiel. Alle rechten voorbehouden.</p>
    </footer>

    <script src="js/main.js"></script>
  </body>
